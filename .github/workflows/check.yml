name: Check Lilly Press Releases

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes, UTC
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

permissions:
  contents: write             # needed so the workflow can commit the updated state file

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Write recipients file from secret
        env:
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: echo "$RECIPIENTS" > recipients.txt

      - name: Run check script
        env:
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: "465"
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python check_lilly_news.py

      - name: Commit updated state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen.json
          git diff --staged --quiet || git commit -m "Update last seen press release"
          git push
